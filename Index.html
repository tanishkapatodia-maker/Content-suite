<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strategy OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'DM Sans', sans-serif; background:#0B1520; }
    .serif { font-family: 'Cormorant Garamond', serif; }
  </style>
</head>

<body class="text-[#E8E0D0]">

<div class="flex min-h-screen">

  <!-- SIDEBAR -->
  <aside class="w-60 bg-[#0C1A28] border-r border-[#1A2A3A] p-4 flex flex-col">
    
    <div class="flex items-center gap-3 mb-6">
      <div class="w-10 h-10 rounded-full bg-[#C9A96E] flex items-center justify-center text-black font-bold">B</div>
      <div>
        <div class="text-sm font-semibold text-[#C0B090]">Strategy OS</div>
        <div class="text-xs text-gray-500">Brand & Business</div>
      </div>
    </div>

    <nav class="flex flex-col gap-2">
      <button onclick="switchTab('research')" class="tab-btn">AI Research</button>
      <button onclick="switchTab('captions')" class="tab-btn">Caption Library</button>
      <button onclick="switchTab('metrics')" class="tab-btn">Growth Metrics</button>
      <button onclick="switchTab('notion')" class="tab-btn">Notion</button>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="flex-1 p-8">

    <!-- RESEARCH -->
    <section id="research" class="tab">
      <h1 class="serif text-3xl mb-2">Content Research</h1>
      <p class="text-gray-400 mb-6">Generate content ideas</p>

      <button onclick="generateIdeas()" class="bg-[#C9A96E] text-black px-5 py-2 rounded-full font-semibold">
        Generate Ideas
      </button>

      <div id="ideas" class="grid grid-cols-3 gap-4 mt-6"></div>
    </section>

    <!-- CAPTIONS -->
    <section id="captions" class="tab hidden">
      <h1 class="serif text-3xl mb-4">Caption Library</h1>

      <input id="captionInput" placeholder="Write caption..."
        class="w-full p-3 rounded bg-[#0C1A28] border border-[#1A2A3A] mb-3" />

      <button onclick="saveCaption()" class="bg-[#C9A96E] text-black px-4 py-2 rounded-full">
        Save Caption
      </button>

      <div id="captionList" class="mt-6 space-y-3"></div>
    </section>

    <!-- METRICS -->
    <section id="metrics" class="tab hidden">
      <h1 class="serif text-3xl mb-6">Growth Metrics</h1>

      <div class="grid grid-cols-4 gap-4">
        <input placeholder="Posts/week" id="posts" class="metric-input">
        <input placeholder="Leads" id="leads" class="metric-input">
        <input placeholder="DMs" id="dms" class="metric-input">
        <input placeholder="Followers" id="followers" class="metric-input">
      </div>

      <button onclick="saveMetrics()" class="mt-4 bg-[#C9A96E] text-black px-4 py-2 rounded-full">
        Save Metrics
      </button>
    </section>

    <!-- NOTION -->
    <section id="notion" class="tab hidden">
      <h1 class="serif text-3xl mb-4">Notion Integration</h1>

      <input id="notionUrl" placeholder="Paste Notion URL"
        class="w-full p-3 rounded bg-[#0C1A28] border border-[#1A2A3A]" />

      <button onclick="saveNotion()" class="mt-3 bg-[#C9A96E] text-black px-4 py-2 rounded-full">
        Save
      </button>

      <div id="notionLink" class="mt-4"></div>
    </section>

  </main>
</div>

<style>
.tab-btn {
  padding: 10px;
  border-radius: 8px;
  text-align: left;
  color: #4A6070;
}
.tab-btn:hover {
  background: #1A2A3A;
}
.metric-input {
  background:#0C1A28;
  border:1px solid #1A2A3A;
  padding:10px;
  border-radius:8px;
}
</style>

<script>

/* TAB SWITCH */
function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

/* STORAGE */
function save(key,data){
  localStorage.setItem(key, JSON.stringify(data));
}
function load(key){
  return JSON.parse(localStorage.getItem(key) || "[]");
}
